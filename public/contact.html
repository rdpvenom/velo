<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Golden Spoon Recipes</title>
  <meta name="description" content="Contact Golden Spoon Recipes." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header>
  <div class="container navbar">
    <div class="logo">Golden Spoon Recipes</div>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="recipes.html">Recipes</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<main class="container section">
  <div class="content-box">
    <h1>Contact Us</h1>
    <form>
      <div class="form-group">
        <label for="name">Name</label>
        <input id="name" type="text" placeholder="Your name" />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="Your email" />
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" rows="6" placeholder="Write your message here"></textarea>
      </div>
      <button class="btn" type="submit">Send Message</button>
    </form>
  </div>
</main>
</body>
</html>
